<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GearShare | Create Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { orange: { 500: '#F97316' } } } } }
        if (localStorage.getItem('gs-theme') === 'light' || (!('gs-theme' in localStorage) && !window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <style>
        body { font-family: 'DM Sans', sans-serif; overflow-x: hidden; }
        .heading { font-family: 'Syne', sans-serif; }
        .btn-orange { background: #F97316; transition: all 0.3s ease; }
        .btn-orange:hover { background: #C2550E; box-shadow: 0 0 20px rgba(249,115,22,0.3); }
        .glow-orb { position: absolute; filter: blur(120px); border-radius: 50%; z-index: -1; }

        /* Dynamic Breathing Animations */
        @keyframes float-orb-1 {
            0% { transform: translate(0px, 0px) scale(1); opacity: 0.3; }
            33% { transform: translate(40px, -30px) scale(1.1); opacity: 0.5; }
            66% { transform: translate(-20px, 40px) scale(0.9); opacity: 0.2; }
            100% { transform: translate(0px, 0px) scale(1); opacity: 0.3; }
        }
        @keyframes float-orb-2 {
            0% { transform: translate(0px, 0px) scale(1); opacity: 0.2; }
            33% { transform: translate(-50px, 20px) scale(0.85); opacity: 0.4; }
            66% { transform: translate(30px, -40px) scale(1.15); opacity: 0.15; }
            100% { transform: translate(0px, 0px) scale(1); opacity: 0.2; }
        }
        .animate-float-1 { animation: float-orb-1 16s infinite ease-in-out; }
        .animate-float-2 { animation: float-orb-2 19s infinite ease-in-out reverse; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center relative py-12 px-4 bg-gray-50 dark:bg-[#0D0D0F] transition-colors duration-300">

    <div class="glow-orb bg-orange-400/20 dark:bg-orange-500/15 w-[500px] h-[500px] top-0 left-[-10%] animate-float-1"></div>
    <div class="glow-orb bg-orange-500/10 dark:bg-orange-600/15 w-[600px] h-[600px] bottom-[-10%] right-[-10%] animate-float-2"></div>

    <div class="p-10 rounded-3xl w-full max-w-lg z-10 relative bg-white/80 dark:bg-[#141417]/80 backdrop-blur-xl border border-gray-200 dark:border-white/10 shadow-2xl transition-colors duration-300">

        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold heading mb-2 text-gray-900 dark:text-white">Join the Network</h1>
            <p class="text-gray-500 dark:text-gray-400 text-sm">Create your verified P2P identity</p>
        </div>

        <div id="message-box" class="hidden w-full p-3 mb-6 rounded-xl text-sm font-medium text-center"></div>

        <form id="register-form" class="space-y-5">
            <div>
                <label class="block text-xs text-gray-600 dark:text-gray-400 mb-2 font-bold uppercase tracking-wider">Username</label>
                <input type="text" id="username" class="w-full px-4 py-3 rounded-xl bg-white dark:bg-[#1A1A1F] border border-gray-300 dark:border-white/10 text-gray-900 dark:text-white focus:outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500 transition-all shadow-sm" placeholder="Unique handle" required>
            </div>

            <div class="flex gap-4">
                <div class="w-1/2">
                    <label class="block text-xs text-gray-600 dark:text-gray-400 mb-2 font-bold uppercase tracking-wider">Password</label>
                    <input type="password" id="password" class="w-full px-4 py-3 rounded-xl bg-white dark:bg-[#1A1A1F] border border-gray-300 dark:border-white/10 text-gray-900 dark:text-white focus:outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500 transition-all shadow-sm" placeholder="••••••••" required>
                </div>
                <div class="w-1/2">
                    <label class="block text-xs text-gray-600 dark:text-gray-400 mb-2 font-bold uppercase tracking-wider">Confirm</label>
                    <input type="password" id="confirm-password" class="w-full px-4 py-3 rounded-xl bg-white dark:bg-[#1A1A1F] border border-gray-300 dark:border-white/10 text-gray-900 dark:text-white focus:outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500 transition-all shadow-sm" placeholder="••••••••" required>
                </div>
            </div>

            <div class="relative">
                <label class="block text-xs text-gray-600 dark:text-gray-400 mb-2 font-bold uppercase tracking-wider">Account Type</label>

                <input type="hidden" id="role" value="renter">

                <button type="button" id="role-custom-select" class="w-full px-4 py-3 rounded-xl bg-white dark:bg-[#1A1A1F] border border-gray-300 dark:border-white/10 text-gray-900 dark:text-white focus:outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500 transition-all shadow-sm flex justify-between items-center cursor-pointer">
                    <span id="role-selected-text">Renter (Looking to borrow)</span>

                    <svg class="w-4 h-4 text-gray-500 dark:text-gray-400 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                    </svg>
                </button>

                <ul id="role-dropdown-menu" class="hidden absolute z-50 w-full mt-2 rounded-xl bg-white dark:bg-[#222228] border border-gray-200 dark:border-white/10 shadow-2xl overflow-hidden transition-all">
                    <li data-value="renter" class="role-option px-4 py-3 text-sm text-gray-700 dark:text-gray-300 hover:bg-orange-50 dark:hover:bg-orange-500/20 hover:text-orange-600 dark:hover:text-orange-400 cursor-pointer transition-colors border-b border-gray-100 dark:border-white/5">
                        Renter (Looking to borrow)
                    </li>
                    <li data-value="owner" class="role-option px-4 py-3 text-sm text-gray-700 dark:text-gray-300 hover:bg-orange-50 dark:hover:bg-orange-500/20 hover:text-orange-600 dark:hover:text-orange-400 cursor-pointer transition-colors">
                        Owner (Listing equipment)
                    </li>
                </ul>
            </div>

            <div>
                <label class="block text-xs text-gray-600 dark:text-gray-400 mb-2 font-bold uppercase tracking-wider">NID / Passport Number</label>
                <input type="text" id="nid" class="w-full px-4 py-3 rounded-xl bg-white dark:bg-[#1A1A1F] border border-gray-300 dark:border-white/10 text-gray-900 dark:text-white focus:outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500 transition-all shadow-sm" placeholder="Required for Trust Verification" required>
            </div>

            <button type="submit" class="w-full py-4 rounded-xl heading font-bold text-white btn-orange mt-4 text-lg shadow-lg shadow-orange-500/30">
                Create Identity
            </button>
        </form>

        <div class="mt-8 text-center border-t border-gray-200 dark:border-gray-800 pt-6">
            <p class="text-gray-500 dark:text-gray-400 text-sm">Already verified? <a href="/login/" class="text-orange-500 hover:text-orange-600 dark:hover:text-orange-400 font-bold transition-colors">Sign in here</a></p>
        </div>
    </div>

    <script>
        // --- CUSTOM DROPDOWN LOGIC ---
        const roleBtn = document.getElementById('role-custom-select');
        const roleMenu = document.getElementById('role-dropdown-menu');
        const roleInput = document.getElementById('role');
        const roleText = document.getElementById('role-selected-text');
        const roleOptions = document.querySelectorAll('.role-option');

        // Toggle menu open/close
        roleBtn.addEventListener('click', () => {
            roleMenu.classList.toggle('hidden');
        });

        // Handle selecting an option
        roleOptions.forEach(option => {
            option.addEventListener('click', (e) => {
                roleText.innerText = e.target.innerText.trim();
                roleInput.value = e.target.getAttribute('data-value');
                roleMenu.classList.add('hidden');
            });
        });

        // Close menu if user clicks outside of it
        document.addEventListener('click', (e) => {
            if (!roleBtn.contains(e.target) && !roleMenu.contains(e.target)) {
                roleMenu.classList.add('hidden');
            }
        });
        // --- END CUSTOM DROPDOWN LOGIC ---

        // --- BACKEND REGISTRATION LOGIC ---
        document.getElementById('register-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const msgBox = document.getElementById('message-box');
            const pass = document.getElementById('password').value;
            const confirmPass = document.getElementById('confirm-password').value;

            if (pass !== confirmPass) {
                msgBox.classList.remove('hidden');
                msgBox.className = 'w-full p-3 mb-6 rounded-xl text-sm font-bold text-center bg-orange-100 dark:bg-orange-500/10 border border-orange-500/30 text-orange-700 dark:text-orange-400';
                msgBox.innerText = 'Security Alert: Passwords do not match.';
                return;
            }

            try {
                const response = await fetch('/api/users/register/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        password: pass,
                        role: document.getElementById('role').value,
                        nid_passport_number: document.getElementById('nid').value
                    })
                });

                msgBox.classList.remove('hidden');
                if (response.ok) {
                    msgBox.className = 'w-full p-3 mb-6 rounded-xl text-sm font-bold text-center bg-green-100 dark:bg-green-500/10 border border-green-500/30 text-green-700 dark:text-green-400';
                    msgBox.innerText = 'Identity Verified. You may now sign in.';
                } else {
                    msgBox.className = 'w-full p-3 mb-6 rounded-xl text-sm font-bold text-center bg-red-100 dark:bg-red-500/10 border border-red-500/30 text-red-700 dark:text-red-400';
                    msgBox.innerText = 'Error: Username already exists or invalid data.';
                }
            } catch (err) {
                msgBox.classList.remove('hidden');
                msgBox.className = 'w-full p-3 mb-6 rounded-xl text-sm font-bold text-center bg-red-100 dark:bg-red-500/10 border border-red-500/30 text-red-700 dark:text-red-400';
                msgBox.innerText = 'Server error. Please check your connection.';
            }
        });
    </script>
</body>
</html>
