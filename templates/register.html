<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GearShare | Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-image: url('https://images.unsplash.com/photo-1516035069371-29a1b244cc32?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover; background-position: center;
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        select option { color: #1f2937; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center relative py-10">
    <div class="absolute inset-0 bg-black/40"></div>

    <div class="relative z-10 bg-white/10 backdrop-blur-md border border-white/20 p-10 rounded-3xl shadow-2xl w-full max-w-md mx-4">
        <div class="text-center mb-6">
            <h1 class="text-4xl font-extrabold text-white mb-2 tracking-tight">Join GearShare</h1>
        </div>

        <div id="message-box" class="hidden w-full p-3 mb-4 rounded-lg text-sm font-medium text-center"></div>

        <form id="register-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-200 mb-1">Username</label>
                <input type="text" id="username" class="w-full px-4 py-2 bg-white/5 border border-white/10 rounded-xl text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500" required>
            </div>

            <div class="flex space-x-4">
                <div class="w-1/2">
                    <label class="block text-sm font-medium text-gray-200 mb-1">Password</label>
                    <input type="password" id="password" class="w-full px-4 py-2 bg-white/5 border border-white/10 rounded-xl text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                </div>
                <div class="w-1/2">
                    <label class="block text-sm font-medium text-gray-200 mb-1">Confirm Pass</label>
                    <input type="password" id="confirm-password" class="w-full px-4 py-2 bg-white/5 border border-white/10 rounded-xl text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-200 mb-1">I want to be a...</label>
                <select id="role" class="w-full px-4 py-2 bg-white/5 border border-white/10 rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="renter">Renter (Looking for gear)</option>
                    <option value="owner">Owner (Listing my gear)</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-200 mb-1">NID / Passport Number</label>
                <input type="text" id="nid" class="w-full px-4 py-2 bg-white/5 border border-white/10 rounded-xl text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500" required>
            </div>

            <button type="submit" class="w-full py-3 px-4 mt-6 bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 text-white font-semibold rounded-xl shadow-lg transition-all duration-200">
                Create Account
            </button>
        </form>

        <div class="mt-4 text-center">
            <p class="text-gray-300 text-sm">Already have an account? <a href="/login/" class="text-blue-400 hover:text-blue-300 font-medium">Sign in</a></p>
        </div>
    </div>

    <script>
        document.getElementById('register-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const msgBox = document.getElementById('message-box');
            const pass = document.getElementById('password').value;
            const confirmPass = document.getElementById('confirm-password').value;

            // 1. Password Match Validation
            if (pass !== confirmPass) {
                msgBox.classList.remove('hidden');
                msgBox.className = 'w-full p-3 mb-4 rounded-lg text-sm font-medium text-center bg-yellow-500/20 border border-yellow-500 text-yellow-300';
                msgBox.innerText = 'Warning: Passwords do not match!';
                return;
            }

            // 2. Send to API if passwords match
            const response = await fetch('/api/users/register/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: document.getElementById('username').value,
                    password: pass,
                    role: document.getElementById('role').value,
                    nid_passport_number: document.getElementById('nid').value
                })
            });

            msgBox.classList.remove('hidden');
            if (response.ok) {
                msgBox.className = 'w-full p-3 mb-4 rounded-lg text-sm font-medium text-center bg-green-500/20 border border-green-500 text-green-300';
                msgBox.innerText = 'Account Created! You can now log in.';
            } else {
                msgBox.className = 'w-full p-3 mb-4 rounded-lg text-sm font-medium text-center bg-red-500/20 border border-red-500 text-red-300';
                msgBox.innerText = 'Error: Username might already exist.';
            }
        });
    </script>
</body>
</html>
