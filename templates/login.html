<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GearShare | Secure Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-image: url('https://images.unsplash.com/photo-1516035069371-29a1b244cc32?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover; background-position: center;
            animation: fadeIn 0.3s ease-in-out; /* Fixes the flash */
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center relative">
    <div class="absolute inset-0 bg-black/40"></div>

    <div class="relative z-10 bg-white/10 backdrop-blur-md border border-white/20 p-10 rounded-3xl shadow-2xl w-full max-w-md mx-4">

        <div class="text-center mb-8">
            <h1 class="text-4xl font-extrabold text-white mb-2 tracking-tight">GearShare</h1>
            <p class="text-gray-300 text-sm">Rent. Use. Return. Securely.</p>
        </div>

        <div id="message-box" class="hidden w-full p-3 mb-4 rounded-lg text-sm font-medium text-center"></div>

        <form id="login-form" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-200 mb-1">Username</label>
                <input type="text" id="username" class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white/10 transition-all" required>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-200 mb-1">Password</label>
                <input type="password" id="password" class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white/10 transition-all" required>
            </div>
            <button type="submit" class="w-full py-3 px-4 bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 text-white font-semibold rounded-xl shadow-lg transition-all duration-200">
                Sign In to Vault
            </button>
        </form>

        <div class="mt-6 text-center">
            <p class="text-gray-300 text-sm">Don't have an account? <a href="/register/" class="text-blue-400 hover:text-blue-300 font-medium">Register here</a></p>
            <p class="mt-2"><a href="/" class="text-gray-400 hover:text-white text-xs">← Back to Home</a></p>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault(); // Stop normal reload
            const msgBox = document.getElementById('message-box');

            const response = await fetch('/api/users/login/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: document.getElementById('username').value,
                    password: document.getElementById('password').value
                })
            });

            const data = await response.json();

            msgBox.classList.remove('hidden');
            if (response.ok) {
                msgBox.className = 'w-full p-3 mb-4 rounded-lg text-sm font-medium text-center bg-green-500/20 border border-green-500 text-green-300';
                msgBox.innerText = 'Login Successful! Redirecting to Vault...';

                // SAVE THE USER DATA TO THE BROWSER
                localStorage.setItem('gearshare_username', data.username);
                localStorage.setItem('gearshare_role', data.role);

                // ACTUALLY REDIRECT AFTER 1 SECOND (for the visual effect)
                setTimeout(() => {
                    window.location.href = '/dashboard/';
                }, 1000);

            } else {
                msgBox.className = 'w-full p-3 mb-4 rounded-lg text-sm font-medium text-center bg-red-500/20 border border-red-500 text-red-300';
                msgBox.innerText = 'Error: Invalid username or password.';
            }
        });
    </script>
</body>
</html>
