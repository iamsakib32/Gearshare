{% load static %}
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GearShare | Secure Login</title>

    <link href="{% static 'css/style.css' %}" rel="stylesheet">

    <script>
        if (localStorage.getItem('gs-theme') === 'light' || (!('gs-theme' in localStorage) && !window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.remove('dark');
        }
    </script>

    <style>
        /* ==================================================================
           LOGIN SPECIFIC LAYOUT (Exact 1:1 match with Tailwind)
           ================================================================== */

        .login-wrapper { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; position: relative; z-index: 10; overflow: hidden; }

        .password-container { position: relative; display: flex; align-items: center; }
        .toggle-password { position: absolute; right: 1rem; background: none; border: none; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; padding: 0; transition: color 0.2s; }
        .toggle-password:hover { color: var(--orange-primary); }
        .toggle-password svg { width: 1.25rem; height: 1.25rem; }

        .footer-links { margin-top: 2rem; border-top: 1px solid var(--glass-border); padding-top: 1.5rem; font-size: 0.875rem; text-align: center; color: var(--text-muted); }
        .footer-links a { text-decoration: none; transition: color 0.2s; font-weight: bold; }
        .footer-links a.primary-link { color: var(--orange-primary); }
        .footer-links a.primary-link:hover { color: var(--orange-hover); }
        .footer-links a.secondary-link { color: var(--text-muted); font-size: 0.75rem; font-weight: normal; }
        .footer-links a.secondary-link:hover { color: var(--text-main); }
    </style>
</head>
<body>

    <div class="glow-orb orb-1" style="width: 400px; height: 400px; top: -10%; left: -10%;"></div>
    <div class="glow-orb orb-2" style="width: 500px; height: 500px; bottom: -10%; right: -10%;"></div>

    <div class="login-wrapper">
        <div class="glass-panel" style="max-width: 28rem; width: 100%;">

            <div class="text-center" style="margin-bottom: 2rem;">
                <h1 class="heading" style="font-size: 1.875rem; margin: 0 0 0.5rem 0;">Welcome Back</h1>
                <p class="text-muted" style="margin: 0; font-size: 0.875rem;">Access your verified vault</p>
            </div>

            <div id="message-box" class="msg-box hidden"></div>

            <form id="login-form">
                <div class="form-group">
                    <label class="form-label" for="username">Username or Email</label>
                    <input type="text" id="username" class="form-input" style="padding: 0.875rem 1rem;" placeholder="Enter username or email" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <div class="password-container">
                        <input type="password" id="password" class="form-input" style="padding: 0.875rem 3rem 0.875rem 1rem;" placeholder="••••••••" required>
                        <button type="button" class="toggle-password" data-target="password">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path class="eye-open" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path class="eye-open" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-orange w-full heading" style="margin-top: 0.5rem; font-size: 1.125rem; padding: 1rem; border-radius: 0.75rem; box-shadow: 0 10px 15px -3px rgba(249,115,22,0.3);">
                    Sign In
                </button>
            </form>

            <div class="footer-links">
                <p style="margin: 0 0 0.75rem 0;">New to GearShare? <a href="/register/" class="primary-link">Apply for Account</a></p>
                <p style="margin: 0;"><a href="/" class="secondary-link">← Return Home</a></p>
            </div>

        </div>
    </div>

    <script>
        // --- SHOW PASSWORD TOGGLE LOGIC ---
        document.querySelectorAll('.toggle-password').forEach(button => {
            button.addEventListener('click', function() {
                const targetId = this.getAttribute('data-target');
                const input = document.getElementById(targetId);
                const svg = this.querySelector('svg');

                if (input.type === 'password') {
                    input.type = 'text';
                    svg.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />`;
                } else {
                    input.type = 'password';
                    svg.innerHTML = `<path class="eye-open" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path class="eye-open" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />`;
                }
            });
        });

        // --- BACKEND LOGIC ---
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const msgBox = document.getElementById('message-box');
            try {
                const response = await fetch('/api/users/login/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        password: document.getElementById('password').value
                    })
                });
                const data = await response.json();
                msgBox.classList.remove('hidden');

                if (response.ok) {
                    msgBox.className = 'msg-box msg-success';
                    msgBox.innerText = 'Authentication Success. Initializing Vault...';

                    // SAVE USER DATA TO BROWSER MEMORY
                    localStorage.setItem('gearshare_user_id', data.user_id);
                    localStorage.setItem('gearshare_username', data.username);
                    localStorage.setItem('gearshare_role', data.role);
                    localStorage.setItem('gearshare_profile_pic', data.profile_picture);
                    localStorage.setItem('gearshare_trust_tier', data.trust_tier);
                    localStorage.setItem('gearshare_trust_score', data.trust_score);

                    setTimeout(() => { window.location.href = '/dashboard/'; }, 1000);
                } else {
                    // SPRINT 3: CATCH THE BAN BOUNCER
                    if (response.status === 403) {
                        msgBox.className = 'msg-box msg-error';
                        msgBox.innerText = 'BANNED: Your account has been permanently locked due to failed KYC verification. Contact Customer Care.';
                    } else {
                        msgBox.className = 'msg-box msg-error';
                        msgBox.innerText = 'Access Denied: Invalid credentials.';
                    }
                }
            } catch (err) {
                msgBox.classList.remove('hidden');
                msgBox.className = 'msg-box msg-error';
                msgBox.innerText = 'Server error. Please check your connection.';
            }
        });
    </script>
</body>
</html>
