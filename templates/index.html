<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GearShare | The Smart Way to Access Tech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { orange: { 500: '#F97316', 600: '#C2550E' } } } }
        }

        // Prevents the flash of wrong theme before page loads
        if (localStorage.getItem('gs-theme') === 'light' || (!('gs-theme' in localStorage) && !window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <style>
        body { font-family: 'DM Sans', sans-serif; overflow-x: hidden; }
        h1, h2, h3, .heading { font-family: 'Syne', sans-serif; }
        /* The new custom logo font class */
        .logo-font { font-family: 'Montserrat', sans-serif; }

        .btn-orange { background: #F97316; transition: all 0.3s ease; }
        .btn-orange:hover { background: #C2550E; box-shadow: 0 0 20px rgba(249,115,22,0.4); transform: translateY(-2px); }
        .glow-orb { position: absolute; border-radius: 50%; filter: blur(120px); z-index: -1; }

        /* The Magic: Dynamic Floating Animations */
        @keyframes float-orb-1 {
            0% { transform: translate(0px, 0px) scale(1); opacity: 0.3; }
            33% { transform: translate(40px, -60px) scale(1.2); opacity: 0.5; }
            66% { transform: translate(-30px, 30px) scale(0.9); opacity: 0.2; }
            100% { transform: translate(0px, 0px) scale(1); opacity: 0.3; }
        }
        @keyframes float-orb-2 {
            0% { transform: translate(0px, 0px) scale(1); opacity: 0.2; }
            33% { transform: translate(-50px, 40px) scale(0.85); opacity: 0.4; }
            66% { transform: translate(30px, -40px) scale(1.15); opacity: 0.15; }
            100% { transform: translate(0px, 0px) scale(1); opacity: 0.2; }
        }

        .animate-float-1 { animation: float-orb-1 15s infinite ease-in-out; }
        .animate-float-2 { animation: float-orb-2 18s infinite ease-in-out reverse; }
    </style>
</head>
<body class="min-h-screen flex flex-col relative bg-gray-50 text-gray-900 dark:bg-[#0D0D0F] dark:text-[#FAFAFA] transition-colors duration-300">

    <div class="glow-orb bg-orange-400 dark:bg-orange-500 w-[500px] h-[500px] top-10 -left-32 animate-float-1"></div>
    <div class="glow-orb bg-orange-500 dark:bg-orange-600 w-[400px] h-[400px] bottom-0 right-[-50px] animate-float-2"></div>

    <nav class="sticky top-0 w-full z-50 bg-white/70 dark:bg-[#141417]/70 backdrop-blur-md border-b border-gray-200 dark:border-white/5 transition-colors duration-300">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <img src="/static/images/GearShare Logo only-Photoroom.png" alt="GearShare Logo" class="h-10 w-auto"> <h1 class="text-2xl font-bold logo-font tracking-wide text-gray-900 dark:text-white">Gear<span class="text-orange-500">Share</span></h1>
            </div>

            <div class="space-x-6 flex items-center">
                <button id="theme-toggle" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-white/10 transition-colors">
                    <svg id="theme-toggle-light-icon" class="hidden w-5 h-5 text-gray-200" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"></path>
                    </svg>
                    <svg id="theme-toggle-dark-icon" class="hidden w-5 h-5 text-gray-700" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path>
                    </svg>
                </button>
                <a href="/login/" class="text-gray-600 hover:text-gray-900 dark:text-gray-400 dark:hover:text-white transition-colors text-sm font-medium">Sign In</a>
                <a href="/register/" class="btn-orange text-white px-6 py-2.5 rounded-full text-sm font-bold tracking-wide shadow-lg shadow-orange-500/30">Enter Vault</a>
            </div>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center px-6 relative z-10">
        <div class="max-w-3xl text-center mt-[-10vh]">
            <div class="inline-block px-4 py-1.5 rounded-full border border-orange-500/30 bg-orange-500/10 text-orange-600 dark:text-orange-500 text-xs font-bold tracking-widest uppercase mb-6">
                Peer-to-Peer Rental Network
            </div>
            <h2 class="text-5xl md:text-7xl font-extrabold heading mb-6 leading-tight text-gray-900 dark:text-white">
                Rent. Use. Return.<br><span class="text-transparent bg-clip-text bg-gradient-to-r from-orange-400 to-orange-600">Securely.</span>
            </h2>
            <p class="text-lg md:text-xl text-gray-600 dark:text-gray-400 mb-10 max-w-2xl mx-auto leading-relaxed">
                The trust-first platform for high-end electronic equipment and camera gear. Verified users, immutable evidence, and secure digital contracts.
            </p>
            <div class="flex flex-col sm:flex-row justify-center gap-4">
                <a href="/register/" class="btn-orange text-white px-8 py-4 rounded-xl font-bold tracking-wide text-lg shadow-lg shadow-orange-500/30">Start Renting Gear</a>
                <a href="/login/" class="px-8 py-4 rounded-xl font-bold tracking-wide text-lg text-gray-900 dark:text-white border border-gray-300 dark:border-gray-700 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">List Your Equipment</a>
            </div>
        </div>
    </main>

    <script>
        const themeToggleBtn = document.getElementById('theme-toggle');
        const darkIcon = document.getElementById('theme-toggle-dark-icon');
        const lightIcon = document.getElementById('theme-toggle-light-icon');

        function updateIcons() {
            if (document.documentElement.classList.contains('dark')) {
                lightIcon.classList.remove('hidden'); darkIcon.classList.add('hidden');
            } else {
                darkIcon.classList.remove('hidden'); lightIcon.classList.add('hidden');
            }
        }
        updateIcons();

        themeToggleBtn.addEventListener('click', function() {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            localStorage.setItem('gs-theme', isDark ? 'dark' : 'light');
            updateIcons();
        });
    </script>
</body>
</html>
