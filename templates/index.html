<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GearShare | Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-image: url('https://images.unsplash.com/photo-1516035069371-29a1b244cc32?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            /* This animation fixes the "flash" effect */
            animation: fadeIn 0.4s ease-in-out;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="min-h-screen flex flex-col relative">
    <div class="absolute inset-0 bg-black/50"></div>

    <nav class="relative z-10 w-full p-6 flex justify-between items-center">
        <h1 class="text-2xl font-bold text-white tracking-wider">GearShare</h1>
        <div>
            <a href="/login/" class="text-white hover:text-blue-400 font-medium mr-6 transition-colors">Login</a>
            <a href="/register/" class="bg-blue-600 hover:bg-blue-500 text-white px-5 py-2 rounded-lg font-medium transition-colors">Sign Up</a>
        </div>
    </nav>

    <main class="relative z-10 flex-grow flex items-center justify-center text-center px-4">
        <div class="bg-white/10 backdrop-blur-md border border-white/20 p-12 rounded-3xl shadow-2xl max-w-2xl">
            <h2 class="text-5xl font-extrabold text-white mb-6">Rent. Use. Return. <span class="text-blue-400">Securely.</span></h2>
            <p class="text-xl text-gray-300 mb-8">The smart, trust-first peer-to-peer platform for high-end electronic equipment and camera gear.</p>
            <a href="/register/" class="inline-block bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 text-white font-bold text-lg py-4 px-8 rounded-xl shadow-lg transform hover:-translate-y-1 transition-all duration-200">
                Enter the Vault
            </a>
        </div>
    </main>
</body>
</html>
